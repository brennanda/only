<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送你一片星空</title>
    <style>
        :root {
            --star-color: #fffce1;
            --text-color: #4a69bd;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 深邃星空背景渐变 */
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        /* 背景星星闪烁动画 */
        .bg-star {
            position: absolute;
            color: var(--star-color);
            filter: drop-shadow(0 0 5px white);
            animation: moveUp linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes moveUp {
            from { transform: translateY(105vh) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            to { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* 弹窗样式 - 更加轻盈的月光感 */
        .popup {
            position: absolute;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            color: var(--text-color);
            font-weight: 500;
            font-size: 1rem;
            white-space: nowrap;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 10;
            border-left: 4px solid #fadb5f;
        }

        @keyframes popIn {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0) rotate(var(--r)); opacity: 1; }
        }

        /* 初始按钮 */
        #start-btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        #start-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        /* 点击产生的星星特效 */
        .click-star {
            position: absolute;
            color: #fadb5f;
            pointer-events: none;
            text-shadow: 0 0 10px #fff;
            animation: starExplode 0.8s ease-out forwards;
            z-index: 999;
        }

        @keyframes starExplode {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -180%) scale(2) rotate(180deg); opacity: 0; }
        }

        /* 提示语 */
        .hint {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <button id="start-btn">点亮这片星空</button>
    <div class="hint">（点击屏幕也可以捕捉星星哦）</div>

    <script>
        const messages = [
            "早睡早起 🌙",
            "按时吃饭 🍚",
            "有点还想听你唱歌",
            "每天都要开心",
            "下雨打伞",
            "多喝热水💧",
            "照顾好自己 ⚠️",
            "梦里有未来 ☁️",
            "保持热爱 🌹",
            "不负韶华 🔒",
            "冬有板栗 夏有芒果 🥭",
            "事事符合预期 📩",
            "学业有成"
        ];

        const starIcons = ['⭐', '🌟', '✨', '💫'];
        const btn = document.getElementById('start-btn');
        let index = 0;

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            document.querySelector('.hint').style.display = 'none';
            startSurprise();
        });

        function startSurprise() {
            // 定时弹出温暖的话
            const interval = setInterval(() => {
                if (index < messages.length) {
                    createPopup(messages[index]);
                    index++;
                } else {
                    // 循环随机显示
                    createPopup(messages[Math.floor(Math.random() * messages.length)]);
                }
            }, 900);

            // 背景自动升起星星
            setInterval(createBgStar, 400);
        }

        function createPopup(text) {
            const popup = document.createElement('div');
            popup.className = 'popup';
            popup.innerText = text;

            // 随机坐标
            const x = Math.random() * (window.innerWidth - 160) + 20;
            const y = Math.random() * (window.innerHeight - 150) + 50;
            const rotation = (Math.random() - 0.5) * 15; 

            popup.style.left = `${x}px`;
            popup.style.top = `${y}px`;
            popup.style.setProperty('--r', `${rotation}deg`);

            document.body.appendChild(popup);

            // 自动消失
            setTimeout(() => {
                popup.style.opacity = '0';
                popup.style.transform = 'translateY(-20px) scale(0.8)';
                popup.style.transition = 'all 1.5s';
                setTimeout(() => popup.remove(), 1500);
            }, 3500);
        }

        function createBgStar() {
            const star = document.createElement('div');
            star.className = 'bg-star';
            star.innerHTML = starIcons[Math.floor(Math.random() * starIcons.length)];
            star.style.left = Math.random() * 100 + 'vw';
            star.style.fontSize = (Math.random() * 10 + 10) + 'px';
            star.style.animationDuration = (Math.random() * 4 + 3) + 's';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 7000);
        }

        // 手机触摸特效：爆出星星
        function handleTouch(x, y) {
            for(let i=0; i<3; i++) { // 每次点击出3颗小星
                const star = document.createElement('div');
                star.className = 'click-star';
                star.innerHTML = starIcons[Math.floor(Math.random() * starIcons.length)];
                star.style.left = x + 'px';
                star.style.top = y + 'px';
                star.style.fontSize = (Math.random() * 15 + 15) + 'px';
                // 给点随机位移
                star.style.marginLeft = (Math.random() - 0.5) * 40 + 'px';
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 800);
            }
        }

        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handleTouch(touch.clientX, touch.clientY);
        });

        // 适配电脑点击
        document.addEventListener('mousedown', (e) => {
            if(btn.style.display === 'none') handleTouch(e.clientX, e.clientY);
        });
    </script>
</body>
</html>
